[package]
name = "svc-auth"
version = "0.2.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Web framework
axum = { version = "0.8" }
tower-http = { version = "0.6", features = ["cors"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Auth
jsonwebtoken = "9"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
openidconnect = { version = "4", features = ["reqwest"] }

# Messaging (NATS KV for refresh tokens + bearer validation)
async-nats = "0.48"

# Shared cross-service contracts (bearer-token KV key derivation)
br-core-auth = { git = "https://github.com/BotResources/br-rust-common", package = "br-core-auth", tag = "br-core-auth-v0.5.0" }

# Types & utilities
uuid = { version = "1", features = ["v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenvy = "0.15"
sha2 = "0.10"
base64 = "0.22"
thiserror = "2"
