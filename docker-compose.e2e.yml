services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 2s

  # Two OIDC test IdP fixtures (br-e2e-harness): A is the primary provider,
  # B proves multi-provider routing by issuer and isolates the cooldown
  # test's fetch-counter assertions. No in-container healthcheck (the image
  # is a bare static binary); up.sh / CI curl-wait /health from the host
  # before starting svc-auth, whose startup discovery needs them.
  oidc-idp-a:
    image: ghcr.io/botresources/br-oidc-test-idp:0.1.0
    environment:
      ISSUER: http://localhost:9100
      DEFAULT_CLIENT_ID: e2e-client
    ports:
      - "9100:9100"

  oidc-idp-b:
    image: ghcr.io/botresources/br-oidc-test-idp:0.1.0
    environment:
      ISSUER: http://localhost:9101
      PORT: "9101"
      DEFAULT_CLIENT_ID: e2e-client-b
    ports:
      - "9101:9101"
