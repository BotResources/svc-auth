name: CD

# Triggered by pushing a version tag: v{version}.
# Runs the same publish.sh script as local — cross-compiles for amd64+arm64,
# packages Docker images, pushes to GHCR with a multi-arch manifest.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  publish:
    name: Publish
    runs-on: arc-ubuntu
    # Run inside our custom runner image. It ships rust + sccache +
    # gcc-aarch64-linux-gnu + libc6-dev-arm64-cross + docker-cli + helm,
    # which lets us native-cross-compile both amd64 and arm64 binaries
    # without `cross` (avoids DinD bind-mount issues, see
    # cross-rs/cross#260) and without QEMU emulation. sccache + cargo
    # caches are shared with PR runs via the host volume mounts.
    container:
      image: ghcr.io/botresources/br-arc-runner:stable
      volumes:
        - /cache/sccache:/cache/sccache
        - /cache/cargo:/cache/cargo
    # GitHub Actions inside a `container:` defaults `run:` to `sh -e {0}`.
    # publish.sh uses `[[ ]]`, `=~`, `BASH_REMATCH` — all bash-specific —
    # so opt into bash explicitly here.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      # buildx is needed for `docker build --provenance=false` in publish.sh.
      # NO `setup-qemu-action`: the Dockerfile has no `RUN` instructions, so
      # buildx never needs to exec foreign-arch code. The arm64 binary itself
      # is cross-compiled natively above (gcc-aarch64-linux-gnu, no
      # emulation), and `COPY ${BIN_PATH}` is a layer op the builder does
      # natively. → arm64 docker build is now I/O-bound, not CPU-bound.
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (Docker)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image + chart
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: ./scripts/publish.sh --skip-checks
