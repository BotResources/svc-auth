name: CD

# Triggered by pushing a version tag: v{version}.
# Runs the same publish.sh script as local — cross-compiles for amd64+arm64,
# packages Docker images, pushes to GHCR with a multi-arch manifest.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  publish:
    name: Publish
    runs-on: arc-ubuntu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      # QEMU emulators for building linux/arm64 images on amd64 runners.
      # Without this, `docker build --platform linux/arm64` fails at the first
      # RUN instruction with "exec format error" because the container's shell
      # is the non-native architecture.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Log in to GHCR (Docker)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image + chart
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: ./scripts/publish.sh --skip-checks
