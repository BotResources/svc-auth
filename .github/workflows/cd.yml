name: CD

# Triggered by push to main (after a PR merge). Publishes the image only if
# the Cargo.toml version has no matching git tag yet. The tag is created AFTER
# a successful smoke-test — never before.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  IMAGE: ghcr.io/botresources/br-svc-auth

jobs:
  publish:
    name: Publish
    runs-on: arc-ubuntu
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # -----------------------------------------------------------------------
      # Gate: skip if this version is already tagged (= already published)
      # -----------------------------------------------------------------------
      - name: resolve version + gate
        id: ver
        run: |
          version="$(grep -E '^version\s*=' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if git tag -l "$tag" | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $tag already exists — nothing to publish"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: verify changelog entry
        if: steps.ver.outputs.skip == 'false'
        run: |
          version="${{ steps.ver.outputs.version }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::warning::CHANGELOG.md missing — skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if ! grep -qE "^## ${version}( |$)" CHANGELOG.md; then
            echo "::warning::CHANGELOG.md has no '## $version' heading — skipping publish"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Toolchain: static-musl cross-compile via cargo-zigbuild
      # -----------------------------------------------------------------------
      - name: setup rust targets
        if: steps.ver.outputs.skip == 'false'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - name: setup zig
        if: steps.ver.outputs.skip == 'false'
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: install cargo-zigbuild
        if: steps.ver.outputs.skip == 'false'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: cargo cache
        if: steps.ver.outputs.skip == 'false'
        uses: Swatinem/rust-cache@v2

      - name: setup buildx
        if: steps.ver.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: login to GHCR
        if: steps.ver.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Build: cross-compile both targets
      # -----------------------------------------------------------------------
      - name: cargo zigbuild (x86_64-musl)
        if: steps.ver.outputs.skip == 'false'
        run: cargo zigbuild --release --locked --target x86_64-unknown-linux-musl

      - name: cargo zigbuild (aarch64-musl)
        if: steps.ver.outputs.skip == 'false'
        run: cargo zigbuild --release --locked --target aarch64-unknown-linux-musl

      # -----------------------------------------------------------------------
      # Assert: binaries are truly static (no PT_INTERP segment)
      # -----------------------------------------------------------------------
      - name: assert static (no PT_INTERP)
        if: steps.ver.outputs.skip == 'false'
        run: |
          set -euo pipefail
          for triple in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            path="target/${triple}/release/svc-auth"
            if readelf -l "$path" | grep -q "INTERP"; then
              echo "::error::$path has a PT_INTERP segment — it is NOT static"
              readelf -l "$path" | grep -A2 "INTERP"
              exit 1
            fi
            echo "ok: $path is static"
          done

      # -----------------------------------------------------------------------
      # Package: one image per arch, then multi-arch manifest
      # -----------------------------------------------------------------------
      - name: docker build + push (amd64)
        if: steps.ver.outputs.skip == 'false'
        run: |
          docker build --provenance=false --platform linux/amd64 \
            --build-arg BIN_PATH=target/x86_64-unknown-linux-musl/release/svc-auth \
            --tag "${IMAGE}:${{ steps.ver.outputs.version }}-amd64" .
          docker push "${IMAGE}:${{ steps.ver.outputs.version }}-amd64"

      - name: docker build + push (arm64)
        if: steps.ver.outputs.skip == 'false'
        run: |
          docker build --provenance=false --platform linux/arm64 \
            --build-arg BIN_PATH=target/aarch64-unknown-linux-musl/release/svc-auth \
            --tag "${IMAGE}:${{ steps.ver.outputs.version }}-arm64" .
          docker push "${IMAGE}:${{ steps.ver.outputs.version }}-arm64"

      - name: create + push multi-arch manifest
        if: steps.ver.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          for tag in "$VERSION" latest stable; do
            docker manifest create --amend "${IMAGE}:${tag}" \
              "${IMAGE}:${VERSION}-amd64" \
              "${IMAGE}:${VERSION}-arm64"
            docker manifest push "${IMAGE}:${tag}"
          done

      # -----------------------------------------------------------------------
      # Smoke-test: --version on both arches before tagging
      # -----------------------------------------------------------------------
      - name: smoke-test published image (both arches)
        if: steps.ver.outputs.skip == 'false'
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          EXPECTED="svc-auth ${VERSION}"
          for platform in linux/amd64 linux/arm64; do
            out=$(docker run --rm --platform "${platform}" "${IMAGE}:${VERSION}" --version)
            echo "${platform}: ${out}"
            [[ "$out" == "$EXPECTED" ]] || {
              echo "::error::Smoke-test failed on ${platform}: expected '${EXPECTED}', got '${out}'"
              exit 1
            }
          done

      # -----------------------------------------------------------------------
      # Helm chart publish
      # -----------------------------------------------------------------------
      - name: publish helm chart
        if: steps.ver.outputs.skip == 'false'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          CHART_REPO="oci://ghcr.io/botresources/charts"

          echo "$GHCR_TOKEN" | helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin

          CHART_OUT="$(mktemp -d)"
          helm package charts/br-svc-auth \
            --version "$VERSION" --app-version "$VERSION" \
            --destination "$CHART_OUT"

          helm push "$CHART_OUT/br-svc-auth-${VERSION}.tgz" "$CHART_REPO"

      # -----------------------------------------------------------------------
      # Auto-tag: only after successful publish + smoke-test
      # -----------------------------------------------------------------------
      - name: create git tag
        if: steps.ver.outputs.skip == 'false'
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "::notice::Created tag $TAG"
