name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ---------------------------------------------------------------------------
  # Auto-fix gate: cargo fmt, auto-push the fix, fail to force re-run.
  # All Rust jobs depend on this via `needs: fmt`.
  # ---------------------------------------------------------------------------
  fmt:
    name: cargo fmt (auto-fix)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --all
        run: cargo fmt --all

      - name: check + auto-fix
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Already formatted."
            exit 0
          fi

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "::error::Code is not formatted. Run 'cargo fmt --all' locally."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: cargo fmt (auto-fix)"
          git push
          echo "::error::Code was auto-formatted and pushed. Please re-run CI."
          exit 1

  # ---------------------------------------------------------------------------
  # Clippy + unit tests + helm lint
  # ---------------------------------------------------------------------------
  check:
    name: clippy + test
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: unit tests
        run: cargo test --lib

      - name: helm lint
        run: helm lint charts/br-svc-auth

      - name: helm template dry-run
        run: helm template ci charts/br-svc-auth --debug > /dev/null

  # ---------------------------------------------------------------------------
  # Supply-chain: audit (RustSec) + deny (licenses/bans/sources) + machete
  # (unused deps). Merged into one job to avoid three separate job overheads
  # (~1.5 min fixed cost each). Tools are installed from prebuilt binaries via
  # taiki-e/install-action — no compilation needed (was ~85 s for cargo-audit,
  # ~2 min for cargo-deny, ~1.5 min for cargo-machete per run).
  # We run both cargo-audit AND cargo-deny because they cover different ground:
  # audit checks your Cargo.lock against RustSec advisories; deny also checks
  # licenses, banned crates, and allowed sources — complementary, not redundant.
  # One taiki-e install step covers all three tools, and the invocations stay
  # plain `cargo …` commands we control.
  # ---------------------------------------------------------------------------
  supply-chain:
    name: supply chain (audit + deny + machete)
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install supply-chain tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny,cargo-machete

      - name: cargo audit (RustSec)
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0049

      - name: cargo deny check
        run: cargo deny --all-features check

      - name: cargo machete (unused deps)
        run: cargo machete

  # ---------------------------------------------------------------------------
  # Changelog entry present (independent — no Rust needed)
  # ---------------------------------------------------------------------------
  changelog:
    name: changelog entry present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: check changelog has entry for current version
        shell: bash
        run: |
          version="$(grep -E '^version\s*=' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md missing"
            exit 1
          fi
          if ! grep -qE "^## ${version}( |$)" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## $version' heading"
            exit 1
          fi
          echo "Found changelog entry for $version"

  # ---------------------------------------------------------------------------
  # Trufflehog: secret scan (independent)
  # ---------------------------------------------------------------------------
  secrets:
    name: trufflehog (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ---------------------------------------------------------------------------
  # Shellcheck (independent)
  # ---------------------------------------------------------------------------
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts
          severity: warning

  # ---------------------------------------------------------------------------
  # E2E: the self-hosted harness suite (tests/e2e.rs). Each test spawns its own
  # real nats-server (br_test_harness::FabricTestNats), its own in-process OIDC
  # IdPs, and the real svc-auth binary — no docker, no external services, no
  # `--ignored`. The only runner dependency is `nats-server` on PATH.
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: install nats-server
        run: |
          NATS_VERSION="v2.14.1"
          URL="https://github.com/nats-io/nats-server/releases/download/${NATS_VERSION}/nats-server-${NATS_VERSION}-linux-amd64.tar.gz"
          curl -sSfL "$URL" -o /tmp/nats-server.tar.gz
          tar -xzf /tmp/nats-server.tar.gz -C /tmp
          sudo install "/tmp/nats-server-${NATS_VERSION}-linux-amd64/nats-server" /usr/local/bin/nats-server
          nats-server --version

      - name: run e2e tests
        run: cargo test --test e2e --test bearer_pl --test rotation_cas

  conformance:
    name: conformance
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: install nats-server
        run: |
          NATS_VERSION="v2.14.1"
          URL="https://github.com/nats-io/nats-server/releases/download/${NATS_VERSION}/nats-server-${NATS_VERSION}-linux-amd64.tar.gz"
          curl -sSfL "$URL" -o /tmp/nats-server.tar.gz
          tar -xzf /tmp/nats-server.tar.gz -C /tmp
          sudo install "/tmp/nats-server-${NATS_VERSION}-linux-amd64/nats-server" /usr/local/bin/nats-server
          nats-server --version

      - name: workspace unit tests (bearer-contract crates)
        run: cargo test -p br-auth-contract -p br-auth-conformance-test -p br-auth-identity-util

      - name: ignored real-infra battery (Go wire + KV)
        run: cargo test -p br-auth-contract -p br-auth-conformance-test -p br-auth-identity-util -- --ignored
